data:
  subjects_csv: data/abide1/subjects.csv
  fc_dir: data/abide1/fc
  raw_1d_dir: data/abide1_raw/cpac/filt_noglobal/rois_cc400

model:
  hidden_dim: 128
  n_layers: 2
  dropout: 0.2
  n_env: 2
  mask_type: node
  temperature: 1.0
  lambda_e1: 1.0
  lambda_e2: 1.0
  lambda_s: 10.0
  use_le1: true
  use_le2: true
  use_ls: true

training:
  lr: 0.0001
  weight_decay: 0.0
  batch_size: 32
  epochs: 50
  seed: 42
  device: auto
  num_workers: 0
  output_dir: outputs/abide1
  checkpoint_dir: checkpoints/abide1
  n_splits: 10
  test_site: Trinity

evaluation:
  threshold: 0.5
